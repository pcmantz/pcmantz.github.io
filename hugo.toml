baseURL = "https://www.mcpantz.org/"
theme = "risotto"
title = "M.C. Pantz"
languageCode = "en"
enableInlineShortcodes = true

[permalinks]
  [permalinks.page]
    blog = "/blog/:year/:month/:day/:slug/"

[pagination]
pagerSize = 10

[params]
noindex = false

[params.theme]
palette = "base16-dark"

[params.about]
title = "M.C. Pantz"
description = "Something Bloglike"

[menu]

  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog/"
    weight = 1

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10

[taxonomies]
category = "categories"
tag = "tags"

[markup.goldmark.renderer]
unsafe = true

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = true
